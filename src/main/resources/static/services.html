<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other Premium Services | notifyu.me</title>
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-dim: #94a3b8; --accent: #38bdf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding: 2rem; }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        h1 { margin-bottom: 3rem; font-size: 2.5rem; }

        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; }

        .service-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s, border-color 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .service-card:hover { transform: translateY(-10px); border-color: var(--accent); }

        .service-img {
            width: 100%;
            height: 180px;
            background: #0077b5; /* LinkedIn Color placeholder */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .service-info { padding: 1.5rem; }
        .service-info h3 { margin-bottom: 0.5rem; color: var(--accent); }
        .back-home { display: inline-block; margin-bottom: 2rem; color: var(--text-dim); text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <a href="/" class="back-home">← Back to notifyu.me</a>
    <h1>Premium Services</h1>

    <div class="services-grid">
        <a href="/linkedin-premium.html" class="service-card">
            <div class="service-img">in</div> <div class="service-info">
            <h3>LinkedIn Premium</h3>
            <p style="color: var(--text-dim);">Career Plan - 3 Months</p>
        </div>
        </a>

        <div class="service-card" style="opacity: 0.5; cursor: not-allowed;">
            <div class="service-img" style="background: #333;">?</div>
            <div class="service-info">
                <h3>Coming Soon</h3>
                <p>More services being added...</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
