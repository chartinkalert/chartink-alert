server:
  port: ${PORT:8080}

router:
  secret: ${ROUTER_SECRET:MY_SECRET_123}

telegram:
  botToken: ${TELEGRAM_BOT_TOKEN:PASTE_TOKEN_HERE}

spring:
  sql:
    init:
      mode: always
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}